name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build admin panel (Cloudflare)
        run: pnpm --filter @workspace/admin-panel run build:cf

      - name: Stage Pages Functions at repo root
        run: |
          mkdir -p functions/api
          cp "artifacts/admin-panel/functions/api/[[path]].js" "functions/api/[[path]].js"

      - name: Deploy to Cloudflare Pages (with Functions)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy artifacts/admin-panel/dist/public
            --project-name=android-panel-mr-robot
            --branch=main
            --commit-dirty=true
